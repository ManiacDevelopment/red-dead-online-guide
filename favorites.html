<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites</title>

<style>
body{
background:#110b08;
color:#f6ead8;
font-family:Arial;
padding:30px;
max-width:1000px;
margin:auto;
}

.card{
background:#1d1510;
padding:18px;
border-radius:18px;
margin-bottom:16px;
}

button{
background:#d9a13d;
border:none;
padding:10px 16px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h1 style="color:#d9a13d;">Favorite Guides</h1>

<div class="card">
<h2>Money Guide</h2>
<button onclick="saveFavorite('money-guide.html')">
Save Favorite
</button>
</div>

<div class="card">
<h2>Gold Guide</h2>
<button onclick="saveFavorite('gold-guide.html')">
Save Favorite
</button>
</div>

<script>

function saveFavorite(page){

let favorites =
JSON.parse(localStorage.getItem('favorites')) || [];

favorites.push(page);

localStorage.setItem(
'favorites',
JSON.stringify(favorites)
);

alert('Saved to favorites');

}

</script>

</body>
</html>
