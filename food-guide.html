<p>
Food restores cores and provides important buffs during long sessions.
</p>

<h2 style="color:#d9a13d;">Best Foods</h2>

<ul>
<li>Big Game Meat</li>
<li>Minty Big Game</li>
<li>Stew Pot Meals</li>
<li>Canned Food</li>
</ul>

<h2 style="color:#d9a13d;">Tips</h2>

<ul>
<li>Cook meat regularly</li>
<li>Use seasoned meat for stronger buffs</li>
<li>Keep cores full before combat</li>
</ul>
