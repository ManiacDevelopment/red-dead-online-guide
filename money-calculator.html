<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Calculator</title>

<style>
body{
  background:#110b08;
  color:#f6ead8;
  font-family:Arial;
  padding:30px;
  max-width:900px;
  margin:auto;
}

h1{
  color:#d9a13d;
}

.box{
  background:#1d1510;
  padding:20px;
  border-radius:18px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:20px;
  border:none;
  border-radius:12px;
  background:#281b13;
  color:#f6ead8;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#d9a13d;
  color:#140a04;
  font-weight:bold;
}

.result{
  margin-top:20px;
  color:#f5c876;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Money Calculator</h1>

<div class="box">

<label>Collector Sets Sold</label>
<input type="number" id="collector" value="0">

<label>Trader Deliveries</label>
<input type="number" id="trader" value="0">

<button onclick="calculateMoney()">Calculate Money</button>

<div class="result" id="result"></div>

</div>

<script>
function calculateMoney(){

const collector =
Number(document.getElementById('collector').value);

const trader =
Number(document.getElementById('trader').value);

const total =
(collector * 250) +
(trader * 500);

document.getElementById('result').innerText =
'Estimated Dollars: $' + total;

}
</script>

</body>
</html>
